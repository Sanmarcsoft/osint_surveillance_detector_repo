global:
  scrape_interval: 60s
  evaluation_interval: 60s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - localhost:9115

  - job_name: ghostmode
    scrape_interval: 30s
    static_configs:
      - targets:
          - localhost:3200
    metrics_path: /metrics

  - job_name: websites
    scrape_interval: 60s
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - https://www.thephenom.app
          - https://drop.thephenom.app
          - https://nest.thephenom.app
          - https://chat-testing.thephenom.app
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  - job_name: ssl-expiry
    scrape_interval: 21600s
    metrics_path: /probe
    params:
      module:
        - tls_connect
    static_configs:
      - targets:
          - https://www.thephenom.app
          - https://drop.thephenom.app
          - https://nest.thephenom.app
          - https://chat-testing.thephenom.app
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115
